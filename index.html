<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NARA Wine Intelligence</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <p class="header-label">NARA Wine Intelligence</p>
    <h1>🍷 와인 정보 수집 플랫폼</h1>
    <p class="header-meta">스크래퍼 &middot; 데일리 브리핑</p>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="scraper">와인 스크래퍼</button>
    <button class="tab-btn" data-tab="briefing">데일리 브리핑</button>
  </div>

  <main class="container">
    <!-- 와인 스크래퍼 탭 -->
    <section id="tab-scraper" class="tab-panel active">
      <div class="card">
        <div class="card-header">
          <h2>🔍 검색 조건</h2>
        </div>
        <div class="input-group">
          <label for="wineName">와인명</label>
          <input type="text" id="wineName" placeholder="예: Montes Alpha Cabernet Sauvignon">
        </div>
        <div class="input-group">
          <label for="wineBrand">와인 브랜드</label>
          <input type="text" id="wineBrand" placeholder="예: Montes">
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2>📡 수집 소스</h2>
          <span class="meta" id="sourceCount">0개 선택</span>
        </div>
        <div class="source-list" id="sourceList"></div>
        <div class="add-source">
          <input type="text" id="newSourceName" placeholder="새 소스 이름">
          <input type="text" id="newSourceUrl" placeholder="URL (선택)">
          <button id="btnAddSource" class="btn secondary">+ 추가</button>
        </div>
      </div>

      <div class="actions">
        <button id="btnScrapeStart" class="btn primary">스크래핑 시작</button>
        <button id="btnScrapeStop" class="btn danger" disabled>중지</button>
      </div>

      <div class="progress-area hidden" id="scrapeProgress">
        <div class="progress-track"><div class="progress-fill" id="scrapeFill"></div></div>
        <span id="scrapeText">0 / 0</span>
      </div>

      <div class="card result-card">
        <div class="card-header">
          <h2>📊 수집 결과 <span class="badge" id="resultBadge">0</span></h2>
        </div>
        <div class="table-wrap">
          <table class="result-table" id="resultTable">
            <thead>
              <tr><th>와인명</th><th>브랜드</th><th>빈티지</th><th>가격</th><th>상태</th></tr>
            </thead>
            <tbody id="resultBody">
              <tr class="empty"><td colspan="5">검색 결과가 없습니다.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- 데일리 브리핑 탭 -->
    <section id="tab-briefing" class="tab-panel">
      <div class="briefing-summary card">
        <div class="briefing-title-row">
          <h2>📋 오늘의 브리핑 요약</h2>
          <span class="meta" id="briefingDate">2026년 07월 14일 (화)</span>
        </div>
        <div class="tag-row" id="briefingTags"></div>
        <hr class="divider">
        <div class="briefing-section" id="briefingDomestic">
          <div class="section-title" style="color:#1e3a5f;">📰 국내 뉴스·매거진</div>
          <ul class="briefing-list" id="listDomestic"></ul>
        </div>
        <div class="briefing-section" id="briefingNewsroom">
          <div class="section-title" style="color:#0e7490;">🏛 뉴스룸</div>
          <ul class="briefing-list" id="listNewsroom"></ul>
        </div>
        <div class="briefing-section" id="briefingCafe">
          <div class="section-title" style="color:#7c3aed;">🍷 와쌉 카페</div>
          <ul class="briefing-list" id="listCafe"></ul>
        </div>
        <div class="briefing-section" id="briefingYoutube">
          <div class="section-title" style="color:#0891b2;">🎬 YouTube</div>
          <ul class="briefing-list" id="listYoutube"></ul>
        </div>
        <div class="briefing-section" id="briefingBlog">
          <div class="section-title" style="color:#059669;">📝 네이버 블로그</div>
          <ul class="briefing-list" id="listBlog"></ul>
        </div>
        <div class="briefing-section" id="briefingGlobal">
          <div class="section-title" style="color:#475569;">🌐 해외·통계·이벤트</div>
          <ul class="briefing-list" id="listGlobal"></ul>
        </div>
      </div>
    </section>
  </main>

  <div class="overlay hidden" id="detailOverlay">
    <div class="detail-card">
      <button class="close-btn" id="closeDetail">닫기</button>
      <h3 id="detailTitle">와인 상세</h3>
      <dl id="detailList"></dl>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
