<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 로컬 개발 서버(python http.server)는 캐시 헤더를 안 보내는데도 브라우저가
       휴리스틱 캐싱으로 이 문서 자체를 계속 재사용하는 문제가 있었다 — 재검증을
       강제한다. 단, 이 메타 태그는 문서 자체에만 적용되고 <link>/<script>로 불러오는
       별도 리소스(app.js/style.css)의 캐싱에는 영향이 없다 — 그 파일들은 아래처럼
       ?v= 쿼리스트링을 매번 다른 값으로 바꿔서 캐시를 무력화한다(CACHE_BUST 참고). -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>NARA Wine Intelligence</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/style.css?v=10">
</head>
<body>
  <header class="header-bar">
    <div class="header-brand">
      <div class="header-logo">a5</div>
      <div class="header-title">와인정보 스크래퍼</div>
    </div>
    <button id="btnOpenSourcePanel" class="btn-outline">+ 소스 데이터 추가</button>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="scraper">스크래퍼</button>
    <button class="tab-btn" data-tab="briefing">데일리 브리핑</button>
  </div>

  <main class="container">
    <!-- 와인 스크래퍼 탭 -->
    <section id="tab-scraper" class="tab-panel active">

      <div id="scraperSearchView" class="scraper-view search-view">
        <div class="search-eyebrow">온디맨드 검색</div>
        <div class="search-title">브랜드 또는 와인명으로<br>전체 소스를 한 번에 수집합니다</div>
        <div class="search-subtitle" id="searchSubtitle">소스 정보를 불러오는 중…</div>
        <div class="search-row">
          <input type="text" id="queryInput" class="input" placeholder="예: Domaine Dugat-Py">
          <button id="btnStartSearch" class="btn search-btn">스크래핑 시작</button>
        </div>
        <div class="recent-queries" id="recentQueries"></div>
      </div>

      <div id="scraperResultsView" class="scraper-view results-view hidden">
        <div class="results-head">
          <div class="results-query" id="resultsQuery"></div>
          <button id="btnResetSearch" class="btn-outline">새 검색</button>
        </div>
        <div class="results-count" id="resultsCount"></div>
        <!-- job이 running인 동안만 보임 — 카드는 아래 resultsGroups에 실시간으로
             하나씩 추가되고(애니메이션), 이 블록은 진행 상황만 보여준다. -->
        <div id="resultsProgress" class="results-progress hidden">
          <div class="progress-bar-track"><div class="progress-bar-fill" id="progressBarFill"></div></div>
          <div class="progress-rows" id="progressRows"></div>
        </div>
        <div id="resultsFailures" class="hidden">
          <button id="btnToggleFailures" class="failures-toggle">
            <span class="failure-dot"></span>
            <span>실패 <span id="failureCount">0</span>건</span>
            <span class="failures-toggle-label" id="failuresToggleLabel">보기</span>
          </button>
          <div id="failuresList" class="failures-list hidden"></div>
        </div>
        <div id="resultsGroups"></div>
      </div>

    </section>

    <!-- 데일리 브리핑 탭 -->
    <section id="tab-briefing" class="tab-panel">
      <div class="week-nav">
        <button class="btn-icon-round" id="btnPrevWeek" title="이전 주">‹</button>
        <div class="week-info">
          <span class="week-label" id="weekLabel">2026년 7월 2주차</span>
          <span class="week-range" id="weekRange">7/7 ~ 7/13</span>
        </div>
        <button class="btn-icon-round" id="btnNextWeek" title="다음 주">›</button>
      </div>

      <div class="week-calendar" id="weekCalendar"></div>

      <div class="weekly-summary" id="weeklySummary"></div>

      <div id="briefingHero"></div>
    </section>
  </main>

  <!-- 소스 추가 패널 -->
  <div class="source-overlay hidden" id="sourceOverlay"></div>
  <div class="source-panel hidden" id="sourcePanel">
    <div class="source-panel-head">
      <div class="source-panel-title">새 소스 추가</div>
      <button class="source-panel-close" id="btnCloseSourcePanel">×</button>
    </div>
    <div class="source-panel-sub">scraping-sources.md에 새 행을 추가합니다</div>
    <div class="source-cat-row" id="sourceCatRow"></div>
    <div class="source-fields" id="sourceFields"></div>
    <div class="source-helper hidden" id="sourceHelper"></div>
    <button class="btn source-submit-btn" id="btnSubmitSource">scraping-sources.md에 추가</button>

    <div class="source-existing">
      <div class="source-existing-title">등록된 소스</div>
      <div id="sourceExistingGroups">불러오는 중…</div>
    </div>

    <div class="source-added hidden" id="sourceAddedBlock">
      <div class="source-existing-title">이번 세션에 추가됨</div>
      <div id="sourceAddedList"></div>
    </div>
  </div>

  <div class="toast hidden" id="toast"></div>

  <script src="js/app.js?v=11"></script>
</body>
</html>
