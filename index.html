<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NARA Wine Scraper</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <h1>NARA Wine Scraper</h1>
    <p class="subtitle">와인 정보 수집 대시보드</p>
  </header>

  <main class="container">
    <section class="panel source-panel">
      <h2>수집 소스</h2>
      <div class="source-grid" id="sourceGrid"></div>
      <div class="actions">
        <button id="btnStart" class="btn primary">스크래핑 시작</button>
        <button id="btnStop" class="btn danger" disabled>중지</button>
      </div>
      <div class="progress-area hidden" id="progressArea">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <span id="progressText">0 / 0</span>
      </div>
    </section>

    <section class="panel result-panel">
      <h2>수집 결과 <span class="badge" id="resultCount">0</span></h2>
      <div class="table-wrap">
        <table class="result-table" id="resultTable">
          <thead>
            <tr><th>와인명</th><th>빈티지</th><th>가격</th><th>상태</th></tr>
          </thead>
          <tbody id="resultBody"><tr class="empty"><td colspan="4">수집된 데이터가 없습니다.</td></tr></tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="overlay hidden" id="detailOverlay">
    <div class="detail-card">
      <button class="close-btn" id="closeDetail">닫기</button>
      <h3 id="detailTitle">와인 상세</h3>
      <dl id="detailList"></dl>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
