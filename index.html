<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NARA Wine Intelligence</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <p class="header-label">NARA Wine Intelligence</p>
    <h1>와인 정보 수집 플랫폼</h1>
    <p class="header-meta">스크래퍼 &middot; 데일리 브리핑</p>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="scraper">와인 스크래퍼</button>
    <button class="tab-btn" data-tab="briefing">데일리 브리핑</button>
  </div>

  <main class="container">
    <!-- 와인 스크래퍼 탭 -->
    <section id="tab-scraper" class="tab-panel active">
      <div class="card">
        <div class="card-header">
          <h2>검색 조건</h2>
        </div>
        <div class="input-group">
          <label class="input-label" for="wineName">와인명</label>
          <input type="text" id="wineName" class="input" placeholder="예: Montes Alpha Cabernet Sauvignon">
        </div>
        <div class="input-group">
          <label class="input-label" for="wineBrand">와인 브랜드</label>
          <input type="text" id="wineBrand" class="input" placeholder="예: Montes">
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2>수집 소스</h2>
          <span class="meta" id="sourceCount">0개 선택</span>
        </div>
        <div class="source-list" id="sourceList"></div>
      </div>

      <div class="actions">
        <button id="btnScrapeStart" class="btn">스크래핑 시작</button>
        <button id="btnScrapeStop" class="btn-outline" disabled>중지</button>
      </div>

      <div class="progress-area hidden" id="scrapeProgress">
        <div class="progress-track"><div class="progress-fill" id="scrapeFill"></div></div>
        <span id="scrapeText">0 / 0</span>
      </div>

      <div class="card result-card">
        <div class="card-header">
          <h2>수집 결과 <span class="chip-pill" id="resultBadge">0</span></h2>
        </div>
        <div class="table-wrap">
          <table class="ds-table" id="resultTable">
            <thead>
              <tr><th>제목</th><th>소스</th><th>게시일</th><th>매칭 브랜드</th><th>상태</th></tr>
            </thead>
            <tbody id="resultBody">
              <tr class="empty"><td colspan="5">검색 결과가 없습니다.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- 데일리 브리핑 탭 -->
    <section id="tab-briefing" class="tab-panel">
      <!-- 주간 네비게이션 -->
      <div class="week-nav">
        <button class="btn-icon-round" id="btnPrevWeek" title="이전 주">‹</button>
        <div class="week-info">
          <span class="week-label" id="weekLabel">2026년 7월 2주차</span>
          <span class="week-range" id="weekRange">7/7 ~ 7/13</span>
        </div>
        <button class="btn-icon-round" id="btnNextWeek" title="다음 주">›</button>
      </div>

      <!-- 주간 달력 그리드 -->
      <div class="week-calendar" id="weekCalendar"></div>

      <!-- 선택된 날짜 상세 브리핑 -->
      <div class="card hidden" id="briefingDetail">
        <div class="card-header">
          <h2 id="detailDateLabel">브리핑 상세</h2>
          <span class="meta">총 <span id="detailTotal">0</span>건</span>
        </div>
        <div class="tag-row" id="detailTags"></div>
        <hr class="divider">
        <div class="briefing-section" data-section="domestic">
          <div class="section-title" style="color:var(--color-text)">📰 국내 뉴스·매거진</div>
          <ul class="briefing-list" id="detailDomestic"></ul>
        </div>
        <div class="briefing-section" data-section="newsroom">
          <div class="section-title" style="color:var(--color-text)">🏛 뉴스룸</div>
          <ul class="briefing-list" id="detailNewsroom"></ul>
        </div>
        <div class="briefing-section" data-section="cafe">
          <div class="section-title" style="color:var(--color-text)">🍷 와쌉 카페</div>
          <ul class="briefing-list" id="detailCafe"></ul>
        </div>
        <div class="briefing-section" data-section="youtube">
          <div class="section-title" style="color:var(--color-text)">🎬 YouTube</div>
          <ul class="briefing-list" id="detailYoutube"></ul>
        </div>
        <div class="briefing-section" data-section="blog">
          <div class="section-title" style="color:var(--color-text)">📝 네이버 블로그</div>
          <ul class="briefing-list" id="detailBlog"></ul>
        </div>
        <div class="briefing-section" data-section="global">
          <div class="section-title" style="color:var(--color-text)">🌐 해외·통계·이벤트</div>
          <ul class="briefing-list" id="detailGlobal"></ul>
        </div>
      </div>
    </section>
  </main>

  <!-- 모달: 스크래퍼 상세 -->
  <div class="modal-overlay hidden" id="detailOverlay">
    <div class="modal-panel">
      <button class="close-btn" id="closeDetail">닫기</button>
      <h3 id="detailTitle">와인 상세</h3>
      <dl id="detailList"></dl>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
